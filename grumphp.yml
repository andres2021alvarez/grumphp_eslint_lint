grumphp:
  # ============================================================
  # CONFIGURACIÓN GENERAL
  # ============================================================
  stop_on_failure: true
  ignore_unstaged_changes: false
  hooks_preset: local
  hooks_dir: ~
  parallel:
    enabled: false
  additional_info: |
    🌱 GreenCode Reminder:
    - ¿Estás usando el Cache API de Drupal eficientemente?
    - ¿Evitaste consultas SQL pesadas dentro de bucles?
    - ¿Tus imágenes y assets están optimizados?

  ascii:
    failed: ~
    succeeded: ~

  fixer:
    enabled: false

  # ============================================================
  # TAREAS AUTOMATIZADAS
  # ============================================================
  tasks:
    # ----------------------------------------------------------
    # PHPMD - Detectar complejidad y violaciones de diseño (SOLID)
    # ----------------------------------------------------------
    phpmd:
      ruleset:
        - unusedcode
        - codesize
        - naming
      exclude: [vendor, docroot/core, docroot/modules/contrib, docroot/themes/contrib]
      triggered_by: [php, module, install, inc, theme]

    # ----------------------------------------------------------
    # PHPCPD - Evitar duplicidad de código (GreenCode)
    # ----------------------------------------------------------
    phpcpd:
      directory: [docroot/modules/custom, docroot/themes/custom]
      triggered_by: [php, module, install, inc, theme]

    # ----------------------------------------------------------
    # PHP CodeSniffer — Estándar oficial Drupal
    # ----------------------------------------------------------
    phpcs:
      standard: Drupal,DrupalPractice
      report: full
      whitelist_patterns:
        - /docroot\/modules\/custom\/(.*)/
        - /docroot\/themes\/custom\/(.*)/
      ignore_patterns:
        - vendor/
        - node_modules/
        - docroot/core/
        - docroot/modules/contrib/
        - docroot/themes/contrib/
        - "*.min.js"
        - "*.min.css"
      triggered_by:
        - php
        - module
        - install
        - theme
        - inc
        - profile
        - test

    # ----------------------------------------------------------
    # PHPStan — Análisis estático con soporte Drupal
    # ----------------------------------------------------------
    phpstan:
      autoload_file: ~
      configuration: phpstan.neon
      level: 8
      memory_limit: 1G
      force_patterns: []
      ignore_patterns:
        - vendor/
        - docroot/core/
        - docroot/modules/contrib/
        - docroot/themes/contrib/
      triggered_by:
        - php
        - module
        - install
        - inc

    # ----------------------------------------------------------
    # ESLint — JavaScript en módulos y temas custom
    # ----------------------------------------------------------
    eslint:
      bin: ./node_modules/.bin/eslint
      config: .eslintrc.json
      triggered_by:
        - js
      whitelist_patterns:
        - docroot/modules/custom
        - docroot/themes/custom

    # ----------------------------------------------------------
    # Stylelint — CSS/SCSS en módulos y temas custom
    # ----------------------------------------------------------
    stylelint:
      bin: ./node_modules/.bin/stylelint
      config: .stylelintrc.json
      triggered_by:
        - css
        - scss
        - sass
      whitelist_patterns:
        - docroot/themes/custom
        - docroot/modules/custom

    # ----------------------------------------------------------
    # Git Commit Message — Formato de mensajes de commit
    # ----------------------------------------------------------
    git_commit_message:
      allow_empty_message: false
      enforce_capitalized_subject: false
      enforce_no_subject_trailing_period: true
      enforce_single_lined_subject: true
      max_body_width: 72
      max_subject_width: 72
      matchers:
        Must follow conventional commits: /^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?\!?:\s.+/
      case_insensitive: true
      multiline: false

    # ----------------------------------------------------------
    # Git Branch Name — Formato de nombres de ramas
    # ----------------------------------------------------------
    git_branch_name:
      whitelist:
        - /^(feature|bugfix|hotfix|release|chore|test)\/[a-z0-9\-]+$/
      blacklist:
        - master
        - main
        - develop
      allow_detached_head: true

    # ----------------------------------------------------------
    # Composer — Validar composer.json y composer.lock
    # ----------------------------------------------------------
    composer:
      file: composer.json
      no_check_all: false
      no_check_lock: false
      no_check_publish: false
      no_local_repository: false
      with_dependencies: false
      strict: false

    # ----------------------------------------------------------
    # Composer Normalize — Normalizar composer.json
    # ----------------------------------------------------------
    composer_normalize:
      indent_size: ~
      indent_style: ~
      no_update_lock: true
      verbose: false



    # ----------------------------------------------------------
    # JSON Lint — Validar archivos JSON
    # ----------------------------------------------------------
    jsonlint:
      ignore_patterns:
        - node_modules/
        - vendor/
      detect_key_conflicts: true

    # ----------------------------------------------------------
    # YAML Lint — Validar archivos YAML
    # ----------------------------------------------------------
    yamllint:
      ignore_patterns:
        - vendor/
        - node_modules/
      object_support: true
      exception_on_invalid_type: false
      parse_constant: false
      parse_custom_tags: false

    # ----------------------------------------------------------
    # XML Lint — Validar archivos XML (info, routing, services)
    # ----------------------------------------------------------
    xmllint:
      ignore_patterns:
        - vendor/
        - node_modules/
        - docroot/core/
        - docroot/modules/contrib/